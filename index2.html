<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumière - Edição Limitada</title>
    
    <!-- Tailwind CSS com JIT via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        base: '#EAEAE5',
                        surface: '#FFFFFF',
                        accent: '#11100F',
                        muted: '#8E8B85',
                        border: '#D6D5CF',
                    },
                    boxShadow: {
                        premium: '0 4px 60px rgba(0, 0, 0, 0.03), 0 2px 4px rgba(0,0,0,0.02)',
                        glow: '0 0 25px rgba(255, 255, 255, 0.4), inset 0 0 0 1px rgba(255,255,255,0.7)',
                        'glow-accent': '0 0 25px rgba(17, 16, 15, 0.5), inset 0 0 0 1px rgba(17, 16, 15, 0.8)',
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <!-- Iconify -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

    <!-- GSAP / ScrollTrigger / Lenis / SplitType -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/split-type@0.3.4/umd/index.min.js"></script>

    <style>
        /* =========================================
           BASE SETUP & CUSTOM CURSOR
        ========================================= */
        body {
            background-color: #11100F;
            color: #FFFFFF;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            cursor: none; 
        }

        /* Lenis Smooth Scroll Dependencies */
        html.lenis, html.lenis body { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }
        .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
        .lenis.lenis-stopped { overflow: hidden; }
        .lenis.lenis-scrolling iframe { pointer-events: none; }

        /* Custom Cursor Style */
        #custom-cursor {
            position: fixed;
            top: 0; left: 0;
            width: 10px; height: 10px;
            background: #FFFFFF;
            border-radius: 50%;
            pointer-events: none;
            mix-blend-mode: difference;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1), 
                        height 0.3s cubic-bezier(0.16, 1, 0.3, 1),
                        background 0.3s ease;
            will-change: width, height, transform;
        }
        
        #custom-cursor.hovering {
            width: 50px; height: 50px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.5);
            mix-blend-mode: normal;
        }

        /* GPU Compositing Utilities */
        .gpu-accel {
            will-change: transform;
            transform: translateZ(0);
        }

        /* =========================================
           UI COMPONENTS & EFFECTS
        ========================================= */
        /* Glass Panel Extraído do Design System - Adaptado p/ Overlays Escuros */
        .glass-panel {
            background: rgba(17, 16, 15, 0.1); 
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Shimmer Continuo Premium CTA */
        .beam-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .beam-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -150%;
            width: 100%; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg);
            z-index: 10;
            animation: beamShimmer 3s infinite cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes beamShimmer {
            0% { left: -150%; }
            40% { left: 150%; }
            100% { left: 150%; }
        }

        /* Ajustes Estruturais para a biblioteca SplitType */
        .char {
            transform: translateY(115%);
            opacity: 0;
            display: inline-block;
        }
        .line {
            overflow: hidden;
            padding-bottom: 0.1em;
        }
        .word {
            display: inline-block;
        }
    </style>
</head>
<body class="selection:bg-surface selection:text-accent">

    <!-- Cursor customizado global -->
    <div id="custom-cursor"></div>

    <!-- Navegação Responsiva com Glassmorphism -->
    <nav id="navbar" class="fixed top-0 w-full z-50 px-6 md:px-12 py-5 border-b border-white/10 flex justify-between items-center glass-panel" style="opacity: 0; transform: translateY(-20px);">
        <!-- Logo -->
        <div class="flex items-center gap-2 group cursor-pointer hover-trigger">
            <iconify-icon class="text-2xl group-hover:-rotate-12 transition-transform duration-700 ease-[cubic-bezier(0.34,1.56,0.64,1)] text-white" icon="solar:pen-bold-duotone"></iconify-icon>
            <span class="font-bold font-sans tracking-tighter text-lg uppercase text-white">Lumière</span>
        </div>

        <!-- Links Internos (Desktop) -->
        <div class="hidden md:flex gap-10 items-center text-xs font-mono uppercase tracking-widest text-white/50">
            <a href="#" class="hover:text-white transition-colors duration-300 hover-trigger hover:-translate-y-0.5 inline-block transform origin-bottom">A Coleção</a>
            <a href="#" class="hover:text-white transition-colors duration-300 hover-trigger hover:-translate-y-0.5 inline-block transform origin-bottom">Artesanato</a>
            <a href="#" class="hover:text-white transition-colors duration-300 hover-trigger hover:-translate-y-0.5 inline-block transform origin-bottom">Legado</a>
        </div>

        <!-- CTA Secundário Topo -->
        <button class="bg-white text-accent hover:bg-base px-6 py-2.5 rounded-full text-xs font-bold font-mono tracking-widest transition-colors shadow-premium hover-trigger">
            Comprar Agora
        </button>
    </nav>

    <!-- ==========================================
         HERO SECTION: PARALLAX SCRUB CONTAINER
    =========================================== -->
    <!-- Altura forçada de 400vh para permitir rolagem e alimentar a interpolação do vídeo -->
    <section id="hero-section" class="relative h-[400vh]">
        
        <!-- Bloco Viewport Fixo (apresenta o layout como base) -->
        <div class="sticky top-0 h-screen w-full overflow-hidden flex flex-col justify-center">
            
            <!-- Vídeo de Fundo Cover -->
            <video id="hero-video" class="absolute inset-0 w-full h-full object-cover gpu-accel"
                   src="./artools/assets/raw_files/MeuVideo.mp4"
                   muted playsinline preload="auto" style="pointer-events: none;">
            </video>
            
            <!-- Overlays de Leitura Premium -->
            <!-- Esquerda opaca para forte legibilidade do copy -->
            <div class="absolute inset-0 bg-gradient-to-r from-[#11100F] via-[#11100F]/70 to-[#11100F]/10 z-10 pointer-events-none mix-blend-multiply"></div>
            <!-- Vignette extra por cima para depth generalizada -->
            <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,transparent_0%,rgba(0,0,0,0.5)_100%)] z-10 pointer-events-none"></div>

            <!-- Wrapper Conteúdo Principal -->
            <div class="relative z-20 w-full max-w-[1440px] mx-auto px-6 md:px-16 flex items-center h-full">
                
                <!-- Layout Esquerdo Escalonado para o Copy -->
                <div class="w-full lg:w-7/12 flex flex-col gap-8 pb-12 pt-32 lg:pt-0">
                    
                    <!-- Loop Animado Pill / Badge -->
                    <div id="badge-pill" class="inline-flex items-center gap-3 px-4 py-1.5 rounded-full border border-white/20 bg-white/10 backdrop-blur-md w-max shadow-glow gpu-accel group cursor-default shadow-premium">
                        <iconify-icon icon="solar:stars-bold-duotone" class="text-white text-sm opacity-90"></iconify-icon>
                        <span class="text-[10px] sm:text-xs font-mono tracking-widest uppercase text-white font-medium">✦ Edição Limitada</span>
                    </div>

                    <!-- Headline Monumental -->
                    <!-- NOTA: Usar classes utilitárias customizadas para a pill da key-word e assegurar legibilidade em qualquer dispositivo -->
                    <h1 id="hero-headline" class="text-[3.5rem] sm:text-[4.5rem] lg:text-[5.5rem] font-medium font-sans tracking-tighter text-white leading-[1.05] text-balance">
                        A caneta que <br>
                        <span class="bg-surface text-accent px-4 py-0 pb-1 mt-2 mx-1 rounded-[0.2em] inline-block shadow-glow-accent align-baseline transform -rotate-[2deg] italic hover:rotate-0 transition-transform duration-500 hover-trigger cursor-crosshair">
                            redefine
                        </span>
                        <br class="block sm:hidden">
                        o escrever.
                    </h1>

                    <!-- Descrição de Suporte -->
                    <p id="hero-subtitle" class="text-lg md:text-xl lg:text-2xl text-white/70 max-w-lg font-sans leading-relaxed tracking-tight group">
                        Precisão milimétrica, design que dura gerações. Cada traço, uma <span class="text-white">declaração de excelência</span>.
                    </p>

                    <!-- Ações Múltiplas -->
                    <div id="hero-ctas" class="flex flex-col sm:flex-row gap-4 mt-6">
                        <!-- Primary CTA (Destaque principal como estipulado no referencial UI) -->
                        <button class="beam-btn px-8 py-4 bg-surface text-accent rounded-full font-semibold tracking-tight text-[15px] flex items-center justify-center gap-3 shadow-glow-accent transition-transform hover:scale-[1.02] hover-trigger group/btn">
                            Adquirir Agora
                            <iconify-icon icon="solar:arrow-right-linear" class="text-xl group-hover/btn:translate-x-1 transition-transform"></iconify-icon>
                        </button>
                        
                        <!-- Secondary CTA (Glassmorphism Outline) -->
                        <button class="px-8 py-4 border border-white/20 hover:border-white hover:bg-white/5 text-white rounded-full font-medium tracking-tight text-[15px] flex items-center justify-center gap-3 transition-colors backdrop-blur-sm hover-trigger group/btn-sec">
                            ▷ Ver em ação
                            <iconify-icon icon="solar:play-circle-bold-duotone" class="text-xl group-hover/btn-sec:scale-110 opacity-0 -ml-8 group-hover/btn-sec:opacity-100 group-hover/btn-sec:ml-0 transition-all"></iconify-icon>
                        </button>
                    </div>

                </div>
            </div>

            <!-- Indicador Global de Scroll -->
            <div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-30 flex flex-col items-center gap-3 opacity-60 hover:opacity-100 transition-opacity" id="scroll-indicator">
                <span class="text-[10px] font-mono tracking-[0.3em] uppercase text-white/80">Scroll</span>
                <div class="w-[1px] h-12 bg-white/20 overflow-hidden relative rounded-full">
                    <div class="w-full h-1/2 bg-white absolute top-0 left-0 animate-[fall_1.5s_infinite_cubic-bezier(0.4,0,0.2,1)] rounded-full"></div>
                </div>
            </div>
            
        </div>
    </section>

    <!-- Break de Continuidade (Fim do Scroll) -->
    <section class="h-screen bg-accent text-white flex flex-col items-center justify-center relative z-30">
        <div class="text-center px-6 gs-fade-up">
            <div class="inline-flex w-20 h-20 rounded-full border border-white/10 items-center justify-center mb-8 relative">
                <!-- Efeito Ripple Estático simulando encerramento/novo loop visual -->
                <div class="absolute inset-0 rounded-full border border-white/20 animate-ping opacity-20"></div>
                <iconify-icon icon="solar:round-alt-arrow-down-bold-duotone" class="text-4xl text-white/50"></iconify-icon>
            </div>
            <h2 class="text-[3rem] sm:text-[4rem] font-medium tracking-tighter mb-4">Descubra os Detalhes</h2>
            <p class="text-sm font-mono tracking-widest text-muted uppercase">Continuação do layout estático viria aqui...</p>
        </div>
    </section>

    <style>
        @keyframes fall {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(200%); }
        }
    </style>

    <!-- ==========================================
         LÓGICA JAVASCRIPT: Animações & Interações Globais
    =========================================== -->
    <script>
        // ----------------------------------------------------
        // INITIAL SETUP E CUSTOM CURSOR TRACKING
        // ----------------------------------------------------
        const cursor = document.getElementById('custom-cursor');
        const hoverTriggers = document.querySelectorAll('.hover-trigger, button, a');

        // Mover o cursor livremente, bypassando o scroll com position: fixed
        window.addEventListener('mousemove', (e) => {
            gsap.to(cursor, {
                x: e.clientX,
                y: e.clientY,
                duration: 0.15,
                ease: 'power2.out'
            });
        });

        // Toggle do status hover no cursor bolha customizado
        hoverTriggers.forEach(trigger => {
            trigger.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
            trigger.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
        });

        // ----------------------------------------------------
        // LENIS SMOOTH SCHEDULING + GSAP CONFIGURER
        // ----------------------------------------------------
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), 
            smooth: true,
            wheelMultiplier: 1,
        });

        // Interligar Lenis com o Motor de Eventos do ScrollTrigger do GSAP
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time)=>{ lenis.raf(time * 1000); });
        gsap.ticker.lagSmoothing(0, 0);

        // ----------------------------------------------------
        // TIMELINE STARTUP & ANIMAÇÕES DE TEXTO E NAVBAR
        // ----------------------------------------------------
        document.addEventListener('DOMContentLoaded', () => {
            // Dividir as strings hierarquizadas pro GSAP dominar cada nó ou letra perfeitamente
            const splitHeadline = new SplitType('#hero-headline', { types: 'lines, words, chars' });
            const splitSubtitle = new SplitType('#hero-subtitle', { types: 'lines, words' });

            const tl = gsap.timeline({delay: 0.3});

            // 1. Mostrar a Navbar em descida fluida (0.5s de delay percebido pelo usuário após reload)
            tl.to('#navbar', { opacity: 1, y: 0, duration: 1.2, ease: 'power3.out' });

            // 2. Aparecer letras saltando verticalmente da máscara overflow oculta
            tl.to(splitHeadline.chars, {
                y: '0%',
                opacity: 1,
                duration: 0.9,
                stagger: 0.015,
                ease: 'back.out(1.2)'
            }, '-=0.8');

            // 3. Fade-up macio no subtítulo formatado word-by-word
            tl.fromTo(splitSubtitle.words, 
                { opacity: 0, y: 15 },
                { opacity: 1, y: 0, duration: 0.8, stagger: 0.02, ease: 'power3.out' }, 
                '-=0.6'
            );

            // 4. Salto cinético + fade no Badge de Edição Limitada
            tl.fromTo('#badge-pill', 
                { opacity: 0, scale: 0.85, y: 10 },
                { opacity: 1, scale: 1, y: 0, duration: 0.8, ease: 'back.out(2)' },
                '-=0.6'
            );

            // 5. Elevar bloco de call actions suavemente puxando pra cima
            tl.fromTo('#hero-ctas', 
                { opacity: 0, y: 20 },
                { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' },
                '-=0.7'
            );

            // Iniciar o Loop orgânico flutuante e pulsante do Badge após todo o stage ter entrado
            tl.add(() => {
                gsap.to('#badge-pill', {
                    scale: 1.03,
                    boxShadow: '0 0 40px rgba(255,255,255,0.4), inset 0 0 0 1px rgba(255,255,255,0.8)',
                    duration: 2,
                    repeat: -1,
                    yoyo: true,
                    ease: 'sine.inOut'
                });
            });

            // Reação no Scroll para esmaecimento da UI flutuante via Scrubbing natural para o usuário focar no video/produto
            // Fade do ícone pointerzinho de scroll
            gsap.to('#scroll-indicator', {
                opacity: 0,
                scrollTrigger: {
                    trigger: '#hero-section',
                    start: 'top top',
                    end: '+=400',
                    scrub: true
                }
            });
            
            // Fading global dos textos frontais à medida que escrutinamos as dobras visuais parallax
            gsap.to(['#badge-pill', '#hero-headline', '#hero-subtitle', '#hero-ctas'], {
                opacity: 0,
                y: -50,
                stagger: 0.05,
                scrollTrigger: {
                    trigger: '#hero-section',
                    start: 'top top',
                    end: '+=800', 
                    scrub: 1 // o 1 suaviza o recuo
                }
            });
            
            // Aparecimento sutil do fim da pagina usando as classes observer genericas
            gsap.fromTo('.gs-fade-up', 
                { opacity: 0, y: 50 }, 
                { 
                    opacity: 1, y: 0, 
                    duration: 1.2, 
                    ease: 'power3.out',
                    scrollTrigger: {
                        trigger: '.gs-fade-up',
                        start: 'top 80%'
                    }
                }
            );
        });

        // ----------------------------------------------------
        // CORE: MULTIMEDIA PARALLAX SCRUB LOGIC (PRODUTO APPLE)
        // ----------------------------------------------------
        const video = document.getElementById('hero-video');
        const section = document.getElementById('hero-section');

        // Garante que a duração estipulada exista e é validada sem retornos NaN no render
        const initVideoScrub = () => {
            // Força pausa para evitar conflitos de decodificação no browser
            video.pause();

            ScrollTrigger.create({
                trigger: section,
                start: 'top top',
                end: 'bottom bottom',
                // 'true' ao invés de 0.1 evita double-smoothing/jank no conflito com o Lenis
                scrub: true, 
                onUpdate: (self) => {
                    if (video.duration && !isNaN(video.duration)) {
                        let progress = Math.max(0, Math.min(1, self.progress));
                        let targetTime = progress * video.duration;
                        
                        // Atualiza na thread de pintura de forma mais limpa
                        requestAnimationFrame(() => {
                            video.currentTime = targetTime;
                        });
                    }
                }
            });
        };

        // Escutar ativamente o parsing dos metadata antes do GSAP calcular valores. 
        // Fallback imediato se o buffer der load e cached memory processar antes.
        if (video.readyState >= 1) {
            initVideoScrub();
        } else {
            video.addEventListener('loadedmetadata', initVideoScrub);
        }
    </script>
</body>
</html>
